<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#111109"/>
  <!-- Hexagon -->
  <polygon
    points="32,8 54,20 54,44 32,56 10,44 10,20"
    fill="none"
    stroke="#c8a96e"
    stroke-width="2"
  />
  <!-- Inner geometric mark: upward triangle -->
  <polygon
    points="32,20 44,40 20,40"
    fill="none"
    stroke="#c8a96e"
    stroke-width="1.5"
  />
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#c8a96e"/>
</svg>
